name: ci

permissions:
  contents: read

env:
  CV_REPO_TOKEN: ${{ secrets.CV_REPO_TOKEN }}

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - README.md
  pull_request:
    branches: [main]
    paths-ignore:
      - README.md

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: install bun
        uses: oven-sh/setup-bun@v2

      - name: cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: cache playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('bun.lock') }}
          restore-keys: playwright-

      - name: install dependencies
        run: bun install --frozen-lockfile

      - name: build repo
        run: bun run build

      - name: check linting
        run: bun run check && bun run lint
